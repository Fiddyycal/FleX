Probation:

    # What will display infront/behind a players name in chat.
    # These can be left blank or not set at all.
    
    prefix: '&4&lP&r &7'
    suffix: ''
    
    # What will display when this rank is presented.
    # If this is not set or left blank the rank will display as prefix + name.
    # If prefix is blank it will just display as the name.
    
    display: '&4&lProbation&r'
    
    # What will display when this rank is abbreviated.
    # Abbreviations are used in tab lists and sidebars.
    
    abbreviation: 'Muted'
    
Bot:
    display: '&7&lBot&r'
    prefix: '&7&lBot&r &7'
    
